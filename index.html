<style>
/* ── reset / utilities ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Manrope',system-ui,sans-serif;color:#2a2419;line-height:1.45;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{background:none;border:0;font:inherit;color:inherit;cursor:pointer;padding:0;line-height:inherit}
input,textarea{font:inherit;color:inherit}
img,svg{display:block;max-width:100%}
.sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* layout */
.row{display:flex}
.col{display:flex;flex-direction:column}
.items-center{align-items:center}
.items-start{align-items:flex-start}
.items-baseline{align-items:baseline}
.items-end{align-items:flex-end}
.justify-center{justify-content:center}
.justify-between{justify-content:space-between}
.justify-end{justify-content:flex-end}
.flex-1{flex:1 1 0%}
.flex-wrap{flex-wrap:wrap}
.flex-shrink-0{flex-shrink:0}
.grid{display:grid}
.gap-1{gap:.25rem}.gap-1\.5{gap:.375rem}.gap-2{gap:.5rem}.gap-3{gap:.75rem}.gap-4{gap:1rem}.gap-5{gap:1.25rem}.gap-6{gap:1.5rem}
.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
.cols-1{grid-template-columns:repeat(1,minmax(0,1fr))}
.relative{position:relative}.absolute{position:absolute}.fixed{position:fixed}
.inset-0{inset:0}
.z-10{z-index:10}.z-20{z-index:20}.z-50{z-index:50}
.block{display:block}.inline-block{display:inline-block}.inline-flex{display:inline-flex}
.hidden{display:none}
.w-full{width:100%}.h-full{height:100%}
.min-w-0{min-width:0}
.text-center{text-align:center}.text-left{text-align:left}
.uppercase{text-transform:uppercase}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nowrap{white-space:nowrap}
.cursor-pointer{cursor:pointer}.cursor-grab{cursor:grab}
.select-none{user-select:none;-webkit-user-select:none}
.pointer-none{pointer-events:none}
.overflow-x-auto{overflow-x:auto}.overflow-y-auto{overflow-y:auto}.overflow-hidden{overflow:hidden}
.rounded-sm{border-radius:4px}.rounded{border-radius:6px}.rounded-md{border-radius:8px}.rounded-lg{border-radius:10px}.rounded-xl{border-radius:14px}.rounded-2xl{border-radius:18px}.rounded-3xl{border-radius:24px}.rounded-full{border-radius:9999px}
.shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.04)}.shadow{box-shadow:0 2px 6px rgba(0,0,0,.08)}.shadow-lg{box-shadow:0 10px 30px rgba(45,74,46,.2)}

/* size helpers */
.w2{width:.5rem}.w2-5{width:.625rem}.w3{width:.75rem}.w3-5{width:.875rem}.w4{width:1rem}.w5{width:1.25rem}.w6{width:1.5rem}.w8{width:2rem}.w10{width:2.5rem}.w12{width:3rem}.w16{width:4rem}.w20{width:5rem}.w24{width:6rem}
.h2{height:.5rem}.h2-5{height:.625rem}.h3{height:.75rem}.h3-5{height:.875rem}.h4{height:1rem}.h5{height:1.25rem}.h6{height:1.5rem}.h8{height:2rem}.h10{height:2.5rem}.h12{height:3rem}.h16{height:4rem}

/* spacing */
.p-1{padding:.25rem}.p-1\.5{padding:.375rem}.p-2{padding:.5rem}.p-3{padding:.75rem}.p-4{padding:1rem}.p-5{padding:1.25rem}.p-6{padding:1.5rem}.p-7{padding:1.75rem}
.px-2{padding-left:.5rem;padding-right:.5rem}.px-3{padding-left:.75rem;padding-right:.75rem}.px-4{padding-left:1rem;padding-right:1rem}.px-6{padding-left:1.5rem;padding-right:1.5rem}
.py-1{padding-top:.25rem;padding-bottom:.25rem}.py-1\.5{padding-top:.375rem;padding-bottom:.375rem}.py-2{padding-top:.5rem;padding-bottom:.5rem}.py-3{padding-top:.75rem;padding-bottom:.75rem}.py-6{padding-top:1.5rem;padding-bottom:1.5rem}.py-10{padding-top:2.5rem;padding-bottom:2.5rem}
.pt-3{padding-top:.75rem}.pt-6{padding-top:1.5rem}
.pb-2{padding-bottom:.5rem}
.m-0{margin:0}.mx-auto{margin-left:auto;margin-right:auto}
.mt-0\.5{margin-top:.125rem}.mt-1{margin-top:.25rem}.mt-2{margin-top:.5rem}.mt-3{margin-top:.75rem}.mt-5{margin-top:1.25rem}.mt-6{margin-top:1.5rem}.mt-12{margin-top:3rem}
.mb-1\.5{margin-bottom:.375rem}.mb-2{margin-bottom:.5rem}.mb-3{margin-bottom:.75rem}.mb-4{margin-bottom:1rem}.mb-5{margin-bottom:1.25rem}.mb-6{margin-bottom:1.5rem}.mb-7{margin-bottom:1.75rem}.mb-10{margin-bottom:2.5rem}
.ml-1{margin-left:.25rem}.ml-2{margin-left:.5rem}.mr-1{margin-right:.25rem}.mr-1\.5{margin-right:.375rem}
.space-y-1\.5>*+*{margin-top:.375rem}
.space-y-3>*+*{margin-top:.75rem}
.space-y-5>*+*{margin-top:1.25rem}
.space-y-6>*+*{margin-top:1.5rem}

/* type */
.text-xs{font-size:11px}
.text-sm{font-size:13px}
.text-base{font-size:15px}
.text-lg{font-size:18px}
.text-xl{font-size:22px}
.text-2xl{font-size:26px}
.text-3xl{font-size:32px}
.text-4xl{font-size:38px}
.text-5xl{font-size:46px}
.text-6xl{font-size:54px}
.text-10{font-size:10px}
.leading-tight{line-height:1.2}.leading-none{line-height:1}
.tracking-wider{letter-spacing:.05em}.tracking-widest{letter-spacing:.1em}
.font-semibold{font-weight:600}.font-bold{font-weight:700}
.opacity-50{opacity:.5}.opacity-70{opacity:.7}.opacity-75{opacity:.75}.opacity-80{opacity:.8}

/* responsive cols */
@media(min-width:640px){
  .sm\:cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sm\:cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .sm\:text-5xl{font-size:50px}
  .sm\:py-10{padding-top:2.5rem;padding-bottom:2.5rem}
  .sm\:px-6{padding-left:1.5rem;padding-right:1.5rem}
  .sm\:p-7{padding:1.75rem}
  .sm\:mb-10{margin-bottom:2.5rem}
  .sm\:mt-16{margin-top:4rem}
  .sm\:rounded-3xl{border-radius:24px}
  .sm\:max-w-md{max-width:28rem}
  .sm\:flex{display:flex}
  .sm\:items-center{align-items:center}
  .sm\:text-3xl{font-size:34px}
}
@media(min-width:768px){
  .md\:cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .md\:cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
  .md\:text-6xl{font-size:60px}
}
@media(min-width:1024px){
  .lg\:cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
}

/* ── Garden Planner skin ───────────────────────────────────────────────── */
.gp-paper{
  background-color:#f4ecd8;
  background-image:
    radial-gradient(at 20% 30%, rgba(135,168,120,.08) 0px, transparent 50%),
    radial-gradient(at 80% 70%, rgba(200,116,84,.06) 0px, transparent 50%),
    radial-gradient(at 50% 100%, rgba(45,74,46,.05) 0px, transparent 50%);
  min-height:100vh; position:relative;
}
.gp-grain::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.14 0 0 0 0 0.10 0 0 0 0.15 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.35;mix-blend-mode:multiply;
}
.gp-wrap{max-width:1100px;margin:0 auto;padding:24px 16px 80px;position:relative}
@media(min-width:640px){.gp-wrap{padding:40px 24px 80px}}

.gp-display{font-family:'Fraunces',Georgia,serif;font-variation-settings:'opsz' 96;letter-spacing:-.01em}
.gp-italic{font-family:'Fraunces',Georgia,serif;font-style:italic}
.gp-body{font-family:'Manrope',system-ui,sans-serif}

.gp-btn-ghost{background:transparent;color:#2d4a2e;border:1px solid rgba(45,74,46,.3);padding:6px 12px;border-radius:9999px;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all 180ms ease}
.gp-btn-ghost:disabled{opacity:.4;cursor:not-allowed}

.gp-btn{background:#2d4a2e;color:#f4ecd8;border:1px solid #2d4a2e;letter-spacing:.02em;padding:8px 16px;border-radius:10px;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all 200ms ease}

/* Entrance animations: only the modal genuinely mounts/unmounts. */
/* The gp-fade-in / gp-rise classes are kept inert so they don't re-fire on every render. */
.gp-modal{animation:gpRise 220ms ease both}
@keyframes gpRise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Hover styles only on devices that truly hover. On touch, :hover sticks after a tap. */
@media (hover:hover){
  .gp-btn-ghost:hover:not(:disabled){background:rgba(45,74,46,.06);border-color:#2d4a2e}
  .gp-btn:hover:not(:disabled){background:#3a5d3b;transform:translateY(-1px);box-shadow:0 4px 10px rgba(45,74,46,.2)}
}

.gp-divider{height:1px;background-image:linear-gradient(to right,transparent,rgba(107,93,79,.4),transparent);margin:24px 0}

.gp-tab{letter-spacing:.05em;text-transform:uppercase;font-size:11px;font-weight:600;padding:8px 14px;border-radius:9999px;cursor:pointer;transition:all 180ms ease;color:#6b5d4f;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.gp-tab.active{background:#2d4a2e;color:#f4ecd8}
@media (hover:hover){
  .gp-tab:hover{color:#2d4a2e}
}

.gp-input{background:transparent;border:0;outline:0;border-bottom:1px dashed rgba(107,93,79,.5);font-family:'Fraunces',serif;color:#2a2419;padding:4px 2px;width:100%}
.gp-input:focus{border-bottom-color:#2d4a2e;border-bottom-style:solid}

.gp-number{background:#fbf6ea;border:1px solid rgba(107,93,79,.25);font-family:'Manrope',sans-serif;padding:4px 8px;border-radius:4px;outline:0;width:80px;font-size:13px}
.gp-number:focus{border-color:#2d4a2e}

.gp-text{background:#fbf6ea;border:1px solid rgba(107,93,79,.25);font-family:'Manrope',sans-serif;padding:8px 10px;border-radius:6px;outline:0;width:100%;font-size:13px}
.gp-text:focus{border-color:#2d4a2e}

.gp-scroll::-webkit-scrollbar{height:6px;width:6px}
.gp-scroll::-webkit-scrollbar-track{background:transparent}
.gp-scroll::-webkit-scrollbar-thumb{background:rgba(107,93,79,.3);border-radius:3px}

.gp-canvas{
  position:relative;background-color:#e6dec5;
  background-image:radial-gradient(rgba(45,74,46,.09) 1px,transparent 1.5px),radial-gradient(rgba(45,74,46,.05) 1px,transparent 1.2px);
  background-size:32px 32px,11px 11px;background-position:0 0,5px 5px;
  border:1px solid rgba(107,93,79,.4);border-radius:14px;
  box-shadow:inset 0 2px 14px rgba(107,93,79,.18);
  overflow:hidden;touch-action:none;user-select:none;
}
.gp-canvas.planting-mode{cursor:crosshair}
.gp-detail-canvas{
  position:relative;background-color:#efe3c8;
  background-image:radial-gradient(rgba(45,74,46,.10) 1px,transparent 1.6px),radial-gradient(rgba(45,74,46,.06) 1px,transparent 1.3px);
  background-size:26px 26px,9px 9px;background-position:0 0,4px 4px;
  border:2px dashed rgba(107,93,79,.6);border-radius:12px;
  box-shadow:inset 0 2px 16px rgba(107,93,79,.22);
  overflow:hidden;touch-action:none;user-select:none;
}
.gp-detail-canvas.planting-mode{cursor:crosshair}

.gp-rect{position:absolute;cursor:grab;transition:box-shadow 200ms;touch-action:none;overflow:hidden}
.gp-rect:active{cursor:grabbing}
.gp-rect-label{position:absolute;top:4px;left:6px;font-family:'Fraunces',serif;font-style:italic;font-size:11px;line-height:1;color:rgba(74,56,38,.85);pointer-events:none;letter-spacing:.02em;background:rgba(244,236,216,.7);padding:2px 6px;border-radius:3px;backdrop-filter:blur(2px);white-space:nowrap;max-width:calc(100% - 12px);overflow:hidden;text-overflow:ellipsis;z-index:2}
.gp-obj-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:block}

/* Curvy paths */
.gp-paths-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;overflow:visible}
.gp-paths-svg .gp-path-stroke{pointer-events:auto;cursor:grab;touch-action:none}
.gp-paths-svg .gp-path-stroke:active{cursor:grabbing}
.gp-path-handle{pointer-events:auto;cursor:grab;touch-action:none}
.gp-path-handle:active{cursor:grabbing}
.gp-path-add{pointer-events:auto;cursor:pointer;touch-action:none}
.gp-resize-handle{position:absolute;bottom:-10px;right:-10px;width:20px;height:20px;background:#2d4a2e;border:2px solid #f4ecd8;border-radius:50%;cursor:nwse-resize;z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.gp-rotate-handle{position:absolute;top:-34px;left:50%;width:24px;height:24px;margin-left:-12px;background:#87a878;border:2px solid #f4ecd8;border-radius:50%;cursor:grab;z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.gp-rotate-handle:active{cursor:grabbing}
.gp-rotate-stem{position:absolute;top:-14px;left:50%;width:2px;height:14px;margin-left:-1px;background:rgba(135,168,120,.7);z-index:39;pointer-events:none}

.gp-planting{position:absolute;border-radius:50%;border:2px solid;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;cursor:grab;transition:box-shadow 180ms,opacity 200ms,filter 200ms;z-index:12;line-height:1;touch-action:none}
.gp-planting:active{cursor:grabbing}
.gp-planting.selected{box-shadow:0 0 0 3px rgba(45,74,46,.55),0 6px 14px rgba(45,74,46,.28);z-index:30}
.gp-planting.dimmed{opacity:.22;filter:grayscale(.6)}

.gp-scale-bar{position:absolute;bottom:10px;left:10px;height:3px;background:rgba(45,74,46,.45);border-radius:2px;pointer-events:none}
.gp-scale-bar::before,.gp-scale-bar::after{content:"";position:absolute;top:-3px;width:1px;height:9px;background:rgba(45,74,46,.45)}
.gp-scale-bar::before{left:0}.gp-scale-bar::after{right:0}
.gp-scale-label{position:absolute;bottom:14px;font-size:10px;font-family:'Manrope',sans-serif;color:rgba(74,56,38,.7);letter-spacing:.05em;pointer-events:none}

.gp-plant-card{background:#fbf6ea;border:1px solid rgba(107,93,79,.18);transition:all 200ms ease;cursor:pointer;border-radius:14px;padding:12px;text-align:left;width:100%}
.gp-plant-card.selected{border-color:#2d4a2e;background:#eee5cf;box-shadow:inset 0 0 0 1px #2d4a2e,0 4px 12px rgba(45,74,46,.15)}
@media (hover:hover){
  .gp-plant-card:hover{border-color:rgba(45,74,46,.5);transform:translateY(-2px);box-shadow:0 6px 14px rgba(45,74,46,.08)}
}

.gp-banner{background:#2d4a2e;color:#f4ecd8;padding:12px 16px;border-radius:10px;display:flex;align-items:center;gap:12px;margin-bottom:12px;box-shadow:0 4px 14px rgba(45,74,46,.25);flex-wrap:wrap}
.gp-banner-strong{font-family:'Fraunces',serif;letter-spacing:-.01em}

.gp-month-bar{background:#fbf6ea;border:1px solid rgba(107,93,79,.22);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.gp-range{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:linear-gradient(to right,#87a878,#2d4a2e);outline:0;flex:1;min-width:140px}
.gp-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#2d4a2e;border:2px solid #f4ecd8;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.25)}
.gp-range::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#2d4a2e;border:2px solid #f4ecd8;cursor:pointer}

.gp-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:9999px}
.gp-check{width:22px;height:22px;border-radius:6px;border:1.5px solid rgba(107,93,79,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 150ms ease;background:#fbf6ea}
.gp-check.done{background:#2d4a2e;border-color:#2d4a2e}

/* Pollinator forage chart */
.gp-pol-chart{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;align-items:end;min-height:120px}
.gp-pol-col{display:flex;flex-direction:column;align-items:stretch;gap:6px;min-width:0}
.gp-pol-bar-wrap{height:100px;display:flex;align-items:flex-end;background:rgba(107,93,79,.08);border-radius:4px;overflow:hidden}
.gp-pol-bar{width:100%;border-radius:4px 4px 0 0;transition:height 300ms ease}
.gp-pol-month{font-size:10px;text-align:center;color:#6b5d4f;letter-spacing:.02em;text-transform:uppercase;font-weight:600}
.gp-pol-month.current{color:#2d4a2e;text-decoration:underline;text-decoration-thickness:1.5px;text-underline-offset:3px}

textarea.gp-notes{background:transparent;border:0;outline:0;font-family:'Fraunces',serif;color:#2a2419;font-size:16px;line-height:1.65em;width:100%;resize:none;background-image:linear-gradient(transparent calc(1.65em - 1px),rgba(107,93,79,.18) calc(1.65em - 1px),rgba(107,93,79,.18) 1.65em,transparent 1.65em);background-size:100% 1.65em}

@media (hover:hover){
  .gp-soft-hover:hover{background:rgba(0,0,0,.04)}
  .gp-soft-hover-red:hover{background:rgba(255,200,200,.3)}
}
.gp-tag-row{display:flex;flex-wrap:wrap;gap:8px}
.gp-modal-back{position:fixed;inset:0;z-index:50;background:rgba(42,36,25,.4);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.gp-modal-back{align-items:center;padding:1rem}}
.gp-modal{width:100%;background:#f4ecd8;border:1px solid rgba(107,93,79,.25);border-radius:24px 24px 0 0;padding:24px;max-height:90vh;overflow-y:auto;position:relative}
@media(min-width:640px){.gp-modal{max-width:28rem;border-radius:24px;padding:28px}}

.gp-shop-row{display:flex;align-items:center;gap:12px;padding:12px}

.gp-icon{display:inline-block;width:1em;height:1em;vertical-align:-.125em;flex-shrink:0}
</style>

<body>
<div id="root"></div>
<script>
(function(){
"use strict";

// ── tiny helpers ────────────────────────────────────────────────────────
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
const newId = (prefix) => `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const mrange = (a, b) => {
  const out = [];
  let m = a;
  for (let i = 0; i < 12; i++) {
    out.push(m);
    if (m === b) break;
    m = m === 12 ? 1 : m + 1;
  }
  return out;
};

// ── PLANT LIBRARY ───────────────────────────────────────────────────────
const PLANTS = [
  {id:'tomato',name:'Tomato',icon:'🍅',cat:'veg',sun:'Full sun',water:'Regular',space:'45–60 cm',sow:'Mar–Apr indoors',plant:'Late May–Jun',harvest:'Jul–Oct',color:'#c0392b',months:mrange(5,10),tip:'Stake well. Pinch out side shoots on cordon varieties.'},
  {id:'courgette',name:'Courgette',icon:'🥒',cat:'veg',sun:'Full sun',water:'High',space:'90 cm',sow:'Apr–May indoors',plant:'Late May–Jun',harvest:'Jul–Sep',color:'#3a7d44',months:mrange(5,9),tip:'Hungry plant — feed weekly. Pick young for best flavour.'},

const companionRel = (a, b) => {
  if (!a || !b || a === b) return null;
  const ca = COMPANIONS[a], cb = COMPANIONS[b];
  if ((ca && ca.bad.includes(b)) || (cb && cb.bad.includes(a))) return 'bad';
  if ((ca && ca.good.includes(b)) || (cb && cb.good.includes(a))) return 'good';
  return null;
};

    points: (Array.isArray(p.points) ? p.points : []).filter(pt => typeof pt?.x === 'number' && typeof pt?.y === 'number'),
  })).filter(p => p.points.length >= 2),
  shopping: s.shopping && typeof s.shopping === 'object' ? s.shopping : {},
});

const migrateState = (parsed) => {
  if (parsed.gardenLengthM != null && parsed.plantings != null) return ensureShape(parsed);
  const out = {gardenName: parsed.gardenName || 'Our Garden', gardenLengthM:8, gardenWidthM:6, beds:[], objects:[], plantings:[], shopping:{}};
  if (parsed.beds && Array.isArray(parsed.beds)) {
    let cursorX = 0.5;
    parsed.beds.forEach((bed, idx) => {
      const cellCm = bed.cellCm || 30;
      const cellM = cellCm / 100;
      const lengthM = bed.lengthM || (bed.cols || 8) * cellM;
      const widthM = bed.widthM || (bed.rows || 4) * cellM;
      const x = bed.x ?? cursorX;
      const y = bed.y ?? 0.5;
      cursorX += lengthM + 0.5;
      out.beds.push({id: bed.id || newId('bed'), name: bed.name || `Bed ${idx+1}`, x, y, lengthM, widthM, rotation:0, notes: bed.notes || '', tasks:[]});
      if (bed.plants && typeof bed.plants === 'object') {
        Object.entries(bed.plants).forEach(([key, plantId]) => {
          const [r, c] = key.split(',').map(Number);
          out.plantings.push({id: newId('plant'), plantId, x: x + (c+0.5) * cellM, y: y + (r+0.5) * cellM});
        });
      }
    });
  }
  out.beds.forEach(b => {
    out.gardenLengthM = Math.max(out.gardenLengthM, Math.ceil(b.x + b.lengthM + 1));
    out.gardenWidthM = Math.max(out.gardenWidthM, Math.ceil(b.y + b.widthM + 1));
  });
  return ensureShape(out);
};

// ── Geometry transforms ─────────────────────────────────────────────────
const rotateVec = (dx, dy, deg) => {
  const r = (deg * Math.PI) / 180;
  const c = Math.cos(r), s = Math.sin(r);
  return [dx*c + dy*s, -dx*s + dy*c];
};
const angleBetween = (cx, cy, x, y) => (Math.atan2(y - cy, x - cx) * 180) / Math.PI;
const bedLocalToWorld = (bed, lx, ly) => {
  const cx = bed.x + bed.lengthM / 2;
  const cy = bed.y + bed.widthM / 2;
  const [wx, wy] = rotateVec(lx - bed.lengthM/2, ly - bed.widthM/2, -(bed.rotation || 0));
  return [cx + wx, cy + wy];
};
const worldToBedLocal = (bed, wx, wy) => {
  const cx = bed.x + bed.lengthM / 2;
  const cy = bed.y + bed.widthM / 2;
  const [lx, ly] = rotateVec(wx - cx, wy - cy, bed.rotation || 0);
  return [lx + bed.lengthM/2, ly + bed.widthM/2];
};
const pointInBed = (px, py, bed) => {
  const [lx, ly] = worldToBedLocal(bed, px, py);
  return lx >= 0 && lx <= bed.lengthM && ly >= 0 && ly <= bed.widthM;
};

// ── State ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'garden-planner:v4';
const LEGACY_KEYS = ['garden-planner:v3','garden-planner:v2','garden-planner:v1'];

let state = null;
let history = [];
let view = 'design';
let pickerMode = 'plants';
let selectedPlant = null;
let selectedItem = null;
let plantCategory = 'all';
let objectCategory = 'all';
let editingName = false;
let gardenSettingsOpen = false;
let infoPlantId = null;
let notesBedId = null;
let viewMonth = 0;
let newTaskText = '';
let bedDetailId = null;
let canvasWidthPx = 800;
let detailCanvasWidthPx = 800;
let drag = null;
let saveTimer = null;
let resizeObs = null;
let detailResizeObs = null;
let pathDraftId = null;     // id of path currently being drawn (tap-to-add waypoints)
let pathDraftStyle = 'gravel';

// ── Persistence ─────────────────────────────────────────────────────────
function load() {
  let raw = null;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch {}
  if (!raw) {
    for (const k of LEGACY_KEYS) {
      try { const r = localStorage.getItem(k); if (r) { raw = r; break; } } catch {}
    }
  }
  try {
    state = raw ? migrateState(JSON.parse(raw)) : structuredClone(DEFAULT_STATE);
  } catch {
    state = structuredClone(DEFAULT_STATE);
  }
}
function saveSoon() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }, 300);
}

// ── History ─────────────────────────────────────────────────────────────
function pushHistory(snapshot) {
  history.push(JSON.parse(JSON.stringify(snapshot)));
  if (history.length > 50) history.shift();
}
function undo() {
  if (!history.length) return;
  state = history.pop();
  selectedItem = null;
  saveSoon();
  scheduleRender();
}

// ── Render orchestration (with focus restoration) ───────────────────────
let renderQueued = false;
let renderSuppressed = false; // true while a drag is in progress
function scheduleRender() {
  if (renderSuppressed) return;
  if (renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(() => { renderQueued = false; render(); });
}
function render() {
  const root = document.getElementById('root');
  const active = document.activeElement;
  let focusInfo = null;
  if (active && active.dataset && active.dataset.focusKey && root.contains(active)) {
    focusInfo = {
      key: active.dataset.focusKey,
      start: active.selectionStart ?? null,
      end: active.selectionEnd ?? null,
      scrollTop: active.scrollTop || 0,
    };
  }
  // Preserve scroll positions of scrollable horizontal lists
  const scrollers = {};
  root.querySelectorAll('[data-scroll-key]').forEach(el => { scrollers[el.dataset.scrollKey] = el.scrollLeft; });

  root.innerHTML = buildAppHTML();

  // Restore scroll
  root.querySelectorAll('[data-scroll-key]').forEach(el => {
    const v = scrollers[el.dataset.scrollKey];
    if (typeof v === 'number') el.scrollLeft = v;
  });
  // Restore focus
  if (focusInfo) {
    const el = root.querySelector(`[data-focus-key="${CSS.escape(focusInfo.key)}"]`);
    if (el) {
      el.focus({preventScroll:true});
      if (focusInfo.start !== null) {
        try { el.setSelectionRange(focusInfo.start, focusInfo.end); } catch {}
      }
      if (focusInfo.scrollTop) el.scrollTop = focusInfo.scrollTop;
    }
  }

  // Hook up canvas resize observers (they get torn down with innerHTML).
  // Don't sync-update canvasWidthPx here — that would suppress the observer's
  // initial-fire re-render. Let the observer detect the mismatch and recover.
  if (resizeObs) { resizeObs.disconnect(); resizeObs = null; }
  if (detailResizeObs) { detailResizeObs.disconnect(); detailResizeObs = null; }
  const canvas = root.querySelector('#gp-canvas');
  if (canvas) {
    resizeObs = new ResizeObserver(() => {
      const w = canvas.getBoundingClientRect().width;
      if (w > 0 && Math.abs(w - canvasWidthPx) > 2) { canvasWidthPx = w; scheduleRender(); }
    });
    resizeObs.observe(canvas);
  }
  const detail = root.querySelector('#gp-detail-canvas');
  if (detail) {
    detailResizeObs = new ResizeObserver(() => {
      const w = detail.getBoundingClientRect().width;
      if (w > 0 && Math.abs(w - detailCanvasWidthPx) > 2) { detailCanvasWidthPx = w; scheduleRender(); }
    });
    detailResizeObs.observe(detail);
  }
}

// ── Mutations ───────────────────────────────────────────────────────────
function snap() { pushHistory(state); }

function setView(v) { bedDetailId = null; view = v; scheduleRender(); }
function setSelectedPlant(id) { selectedPlant = id; scheduleRender(); }
function setSelectedItem(it) { selectedItem = it; scheduleRender(); }

function placePlantAt(clientX, clientY) {
  if (!selectedPlant) return;
  const canvas = document.getElementById('gp-canvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * state.gardenLengthM;
  const y = (clientY - rect.top) / rect.height * state.gardenWidthM;
  if (x < 0 || x > state.gardenLengthM || y < 0 || y > state.gardenWidthM) return;
  snap();
  state.plantings.push(newPlanting(selectedPlant, x, y));
  saveSoon();
  scheduleRender();
}
function placePlantInBedAt(clientX, clientY) {
  if (!selectedPlant || !bedDetailId) return;
  const bed = state.beds.find(b => b.id === bedDetailId);
  const canvas = document.getElementById('gp-detail-canvas');
  if (!bed || !canvas) return;
  const rect = canvas.getBoundingClientRect();
  const lx = clamp((clientX - rect.left) / rect.width * bed.lengthM, 0, bed.lengthM);
  const ly = clamp((clientY - rect.top) / rect.height * bed.widthM, 0, bed.widthM);
  const [wx, wy] = bedLocalToWorld(bed, lx, ly);
  snap();
  state.plantings.push(newPlanting(selectedPlant, wx, wy));
  saveSoon();
  scheduleRender();
}

function addBed() {
  snap();
  const bed = newBed(
    `Bed ${state.beds.length + 1}`,
    Math.max(0.3, state.gardenLengthM/2 - 1.2),
    Math.max(0.3, state.gardenWidthM/2 - 0.6),
    Math.min(2.4, state.gardenLengthM - 1),
    Math.min(1.2, state.gardenWidthM - 1),
  );
  state.beds.push(bed);
  selectedItem = {type:'bed', id: bed.id};
  saveSoon();
  scheduleRender();
}
function addObject(typeId) {
  snap();
  const tpl = OBJECT_BY_ID[typeId];
  const obj = newObjectInst(
    typeId,
    Math.max(tpl.L/2, state.gardenLengthM/2 - tpl.L/2),
    Math.max(tpl.W/2, state.gardenWidthM/2 - tpl.W/2),
  );
  state.objects.push(obj);
  selectedItem = {type:'object', id: obj.id};
  saveSoon();
  scheduleRender();
}
function deleteSelected() {
  if (!selectedItem) return;
  snap();
  if (selectedItem.type === 'bed')      state.beds      = state.beds.filter(b => b.id !== selectedItem.id);
  else if (selectedItem.type === 'object')   state.objects   = state.objects.filter(o => o.id !== selectedItem.id);
  else if (selectedItem.type === 'planting') state.plantings = state.plantings.filter(p => p.id !== selectedItem.id);
  else if (selectedItem.type === 'path')     state.paths     = state.paths.filter(p => p.id !== selectedItem.id);
  selectedItem = null;
  saveSoon();
  scheduleRender();
}
function duplicateSelected() {
  if (!selectedItem) return;
  snap();
  if (selectedItem.type === 'bed') {
    const b = state.beds.find(x => x.id === selectedItem.id);
    if (!b) return;
    const copy = {...b, id:newId('bed'), name:`${b.name} copy`, x:b.x+0.3, y:b.y+0.3, tasks: b.tasks.map(t => ({...t, id:newId('task')}))};
    state.beds.push(copy);
    selectedItem = {type:'bed', id: copy.id};
  } else if (selectedItem.type === 'object') {
    const o = state.objects.find(x => x.id === selectedItem.id);
    if (!o) return;
    const copy = {...o, id:newId('obj'), x:o.x+0.3, y:o.y+0.3};
    state.objects.push(copy);
    selectedItem = {type:'object', id: copy.id};
  } else if (selectedItem.type === 'planting') {
    const p = state.plantings.find(x => x.id === selectedItem.id);
    if (!p) return;
    const copy = {...p, id:newId('plant'), x:p.x+0.25, y:p.y+0.25};
    state.plantings.push(copy);
    selectedItem = {type:'planting', id: copy.id};
  }
  saveSoon();
  scheduleRender();
}
function updateBed(id, patch) {
  const b = state.beds.find(b => b.id === id);
  if (!b) return;
  Object.assign(b, patch);
  saveSoon();
}
function updateObject(id, patch) {
  const o = state.objects.find(o => o.id === id);
  if (!o) return;
  Object.assign(o, patch);
  saveSoon();
}
function updatePlanting(id, patch) {
  const p = state.plantings.find(p => p.id === id);
  if (!p) return;
  Object.assign(p, patch);
  saveSoon();
}
function updatePath(id, patch) {
  const p = state.paths.find(p => p.id === id);
  if (!p) return;
  Object.assign(p, patch);
  saveSoon();
}
function updatePathPoint(id, idx, pctX, pctY) {
  const p = state.paths.find(p => p.id === id);
  if (!p || !p.points[idx]) return;
  p.points[idx].x = clamp(pctX, 0, 100);
  p.points[idx].y = clamp(pctY, 0, 100);
  saveSoon();
}

// Start a new path-draw session — every subsequent canvas tap adds a waypoint.
// First call adds the path with two points so the user immediately sees something on tap.
function startPathDraft(style = 'gravel') {
  snap();
  pathDraftStyle = style;
  const id = newId('path');
  state.paths.push({id, style, widthM: 0.6, points: []});
  pathDraftId = id;
  selectedItem = null;
  saveSoon();
  scheduleRender();
}
// Add a waypoint to the in-progress path (called from canvas tap when pathDraftId set).
function appendPathPoint(pctX, pctY) {
  if (!pathDraftId) return;
  const p = state.paths.find(p => p.id === pathDraftId);
  if (!p) return;
  p.points.push({x: clamp(pctX, 0, 100), y: clamp(pctY, 0, 100)});
  saveSoon();
  scheduleRender();
}
// Finish drawing — keep the path if it has at least 2 points, otherwise discard.
function finishPathDraft() {
  if (!pathDraftId) return;
  const p = state.paths.find(p => p.id === pathDraftId);
  const id = pathDraftId;
  pathDraftId = null;
  if (!p || p.points.length < 2) {
    state.paths = state.paths.filter(x => x.id !== id);
  } else {
    selectedItem = {type:'path', id};
  }
  saveSoon();
  scheduleRender();
}
function insertPathPoint(pathId, afterIndex) {
  const p = state.paths.find(p => p.id === pathId);
  if (!p) return;
  const a = p.points[afterIndex];
  const b = p.points[afterIndex + 1];
  if (!a || !b) return;
  snap();
  // Insert at the curve midpoint between the two waypoints (Bezier mid, not Euclidean)
  const mid = curveSegmentMid(p.points[afterIndex-1], a, b, p.points[afterIndex+2]);
  p.points.splice(afterIndex + 1, 0, {x: mid.x, y: mid.y});
  saveSoon();
  scheduleRender();
}
function updateGarden(patch) { Object.assign(state, patch); saveSoon(); scheduleRender(); }
function setGardenName(v) { state.gardenName = v; saveSoon(); }

function addBedTask(bedId, text) {
  const t = text.trim();
  if (!t) return;
  snap();
  const b = state.beds.find(b => b.id === bedId);
  if (b) b.tasks.push(newTask(t));
  newTaskText = '';
  saveSoon();
  scheduleRender();
}
function toggleBedTask(bedId, taskId) {
  const b = state.beds.find(b => b.id === bedId);
  const t = b && b.tasks.find(t => t.id === taskId);
  if (t) { t.done = !t.done; saveSoon(); scheduleRender(); }
}
function deleteBedTask(bedId, taskId) {
  snap();
  const b = state.beds.find(b => b.id === bedId);
  if (b) b.tasks = b.tasks.filter(t => t.id !== taskId);
  saveSoon();
  scheduleRender();
}
function toggleShopping(key) {
  state.shopping = {...state.shopping, [key]: !state.shopping[key]};
  saveSoon();
  scheduleRender();
}
function setBedNotes(bedId, notes) {
  const b = state.beds.find(b => b.id === bedId);
  if (b) { b.notes = notes; saveSoon(); }
}

// ── Derived computations ────────────────────────────────────────────────
function computeStats() {
  const counts = {};
  state.plantings.forEach(p => { counts[p.plantId] = (counts[p.plantId] || 0) + 1; });
  return Object.entries(counts)
    .map(([id, n]) => ({plant: PLANTS_BY_ID[id], n}))
    .filter(x => x.plant)
    .sort((a,b) => b.n - a.n);
}
function computeShoppingList() {
  const pCounts = {};
  state.plantings.forEach(p => { pCounts[p.plantId] = (pCounts[p.plantId] || 0) + 1; });
  const plants = Object.entries(pCounts)
    .map(([id, n]) => ({plant: PLANTS_BY_ID[id], n, key: `plant:${id}`}))
    .filter(x => x.plant)
    .sort((a,b) => Math.min(...a.plant.months) - Math.min(...b.plant.months));
  const oCounts = {};
  state.objects.forEach(o => { oCounts[o.typeId] = (oCounts[o.typeId] || 0) + 1; });
  const materials = Object.entries(oCounts)
    .map(([typeId, n]) => ({obj: OBJECT_BY_ID[typeId], n, key: `obj:${typeId}`}))
    .filter(x => x.obj)
    .sort((a,b) => a.obj.name.localeCompare(b.obj.name));
  return {plants, materials};
}
function bedCapacity(bed) {
  const area = bed.lengthM * bed.widthM;
  const inside = state.plantings.filter(p => pointInBed(p.x, p.y, bed));
  let avgCell = 0.09;
  if (inside.length) {
    const avgCm = inside.reduce((sum, p) => sum + (PLANTS_BY_ID[p.plantId]?.sizeCm || 30), 0) / inside.length;
    avgCell = Math.max(0.01, Math.pow(avgCm / 100, 2));
  }
  return {cap: Math.max(1, Math.floor(area / avgCell)), planted: inside.length};
}
function filteredPlants() {
  return plantCategory === 'all' ? ENRICHED_PLANTS : ENRICHED_PLANTS.filter(p => p.cat === plantCategory);
}
function filteredObjects() {
  return objectCategory === 'all' ? OBJECTS : OBJECTS.filter(o => o.cat === objectCategory);
}

// ── Drag system ─────────────────────────────────────────────────────────
// Find the DOM element being dragged so we can mutate its style directly
// instead of re-rendering the entire app on every pointer move.
function findDragEl() {
  if (!drag) return null;
  const root = document.getElementById('root');
  if (drag.type === 'bed' || drag.type === 'object') {
    return root.querySelector('.gp-rect[data-type="' + drag.type + '"][data-id="' + drag.id + '"]');
  } else if (drag.type === 'planting') {
    return root.querySelector('#gp-canvas .gp-planting[data-id="' + drag.id + '"]');
  } else if (drag.type === 'detail-planting') {
    return root.querySelector('#gp-detail-canvas .gp-planting[data-id="' + drag.id + '"]');
  }
  return null;
}

// Apply the current state of the dragged item directly to its DOM node.
// Cheap, no full re-render, no animations, no focus-restoration overhead.
function updateDragVisual() {
  const el = findDragEl();
  if (!el) return;
  if (drag.type === 'bed' || drag.type === 'object') {
    const item = (drag.type === 'bed' ? state.beds : state.objects).find(x => x.id === drag.id);
    if (!item) return;
    const scale = canvasWidthPx / state.gardenLengthM;
    el.style.left = ((item.x + item.lengthM / 2) / state.gardenLengthM) * 100 + '%';
    el.style.top  = ((item.y + item.widthM  / 2) / state.gardenWidthM)  * 100 + '%';
    el.style.width  = (item.lengthM * scale) + 'px';
    el.style.height = (item.widthM  * scale) + 'px';
    el.style.transform = 'translate(-50%,-50%) rotate(' + (item.rotation || 0) + 'deg)';
  } else if (drag.type === 'planting') {
    const p = state.plantings.find(x => x.id === drag.id);
    if (!p) return;
    el.style.left = (p.x / state.gardenLengthM) * 100 + '%';
    el.style.top  = (p.y / state.gardenWidthM)  * 100 + '%';
  } else if (drag.type === 'detail-planting') {
    const bed = state.beds.find(b => b.id === drag.bedId);
    const p = state.plantings.find(x => x.id === drag.id);
    if (!bed || !p) return;
    const [lx, ly] = worldToBedLocal(bed, p.x, p.y);
    el.style.left = (lx / bed.lengthM) * 100 + '%';
    el.style.top  = (ly / bed.widthM)  * 100 + '%';
  }
}

function startDrag(e, type, id, mode, targetEl) {
  mode = mode || 'move';
  e.stopPropagation();
  if ((type === 'bed' || type === 'object') && mode === 'move' && selectedPlant) {
    placePlantAt(e.clientX, e.clientY);
    return;
  }
  const canvas = document.getElementById('gp-canvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const scalePx = rect.width / state.gardenLengthM;
  let initial;
  if (type === 'bed' || type === 'object') {
    const item = (type === 'bed' ? state.beds : state.objects).find(x => x.id === id);
    if (!item) return;
    initial = {x:item.x, y:item.y, lengthM:item.lengthM, widthM:item.widthM, rotation:item.rotation || 0};
    if (mode === 'rotate') {
      const cxM = item.x + item.lengthM/2;
      const cyM = item.y + item.widthM/2;
      const cxPx = rect.left + (cxM / state.gardenLengthM) * rect.width;
      const cyPx = rect.top + (cyM / state.gardenWidthM) * rect.height;
      initial.startAngle = angleBetween(cxPx, cyPx, e.clientX, e.clientY);
    }
  } else if (type === 'planting') {
    const p = state.plantings.find(p => p.id === id);
    if (!p) return;
    initial = {x:p.x, y:p.y};
  }
  drag = {type, id, mode, startX:e.clientX, startY:e.clientY, scalePx, initial, preDragState: JSON.parse(JSON.stringify(state)), moved:false};
  selectedItem = {type, id};
  // Suppress re-renders for the duration of the drag — the dragged element gets updated
  // in place by updateDragVisual instead of being destroyed and recreated each frame.
  // Because we no longer re-render mid-drag, the touched element stays in the DOM and
  // the browser's implicit pointer capture handles touch tracking correctly.
  renderSuppressed = true;
  e.preventDefault();
}

function startPathPointDrag(e, pathId, pointIndex, targetEl) {
  e.stopPropagation();
  const canvas = document.getElementById('gp-canvas');
  if (!canvas) return;
  const path = state.paths.find(p => p.id === pathId);
  if (!path || !path.points[pointIndex]) return;
  drag = {
    type: 'path-point',
    pathId,
    pointIndex,
    startX: e.clientX,
    startY: e.clientY,
    initial: {...path.points[pointIndex]},
    preDragState: JSON.parse(JSON.stringify(state)),
    moved: false,
  };
  selectedItem = {type:'path', id: pathId};
  renderSuppressed = true;
  e.preventDefault();
}

function startDetailDrag(e, plantingId, targetEl) {
  e.stopPropagation();
  if (!bedDetailId) return;
  const bed = state.beds.find(b => b.id === bedDetailId);
  const p = state.plantings.find(p => p.id === plantingId);
  const canvas = document.getElementById('gp-detail-canvas');
  if (!bed || !p || !canvas) return;
  const rect = canvas.getBoundingClientRect();
  const scalePx = rect.width / bed.lengthM;
  const [lx, ly] = worldToBedLocal(bed, p.x, p.y);
  drag = {type:'detail-planting', id:plantingId, bedId:bed.id, startX:e.clientX, startY:e.clientY, scalePx, initialLocal:[lx, ly], preDragState: JSON.parse(JSON.stringify(state)), moved:false};
  selectedItem = {type:'planting', id:plantingId};
  renderSuppressed = true;
  e.preventDefault();
}

function snapPosition(nx, ny, L, W, selfId) {
  const SNAP = 0.12;
  const vCands = [0, state.gardenLengthM];
  const hCands = [0, state.gardenWidthM];
  [...state.beds, ...state.objects].forEach(it => {
    if (it.id === selfId) return;
    vCands.push(it.x, it.x + it.lengthM);
    hCands.push(it.y, it.y + it.widthM);
  });
  let sx = nx, sy = ny;
  for (const c of vCands) {
    if (Math.abs(nx - c) < SNAP) { sx = c; break; }
    if (Math.abs((nx + L) - c) < SNAP) { sx = c - L; break; }
  }
  for (const c of hCands) {
    if (Math.abs(ny - c) < SNAP) { sy = c; break; }
    if (Math.abs((ny + W) - c) < SNAP) { sy = c - W; break; }
  }
  return [sx, sy];
}

function onPointerMove(e) {
  if (!drag) return;
  if (Math.abs(e.clientX - drag.startX) > 2 || Math.abs(e.clientY - drag.startY) > 2) drag.moved = true;
  if (!drag.moved) return;

  // Path-point drag uses % units. SVG re-renders are cheap, so we just
  // bypass renderSuppressed temporarily for these.
  if (drag.type === 'path-point') {
    const canvas = document.getElementById('gp-canvas');
    if (!canvas) return;
    const rect = canvas.getBoundingClientRect();
    const dxPct = ((e.clientX - drag.startX) / rect.width)  * 100;
    const dyPct = ((e.clientY - drag.startY) / rect.height) * 100;
    updatePathPoint(drag.pathId, drag.pointIndex, drag.initial.x + dxPct, drag.initial.y + dyPct);
    renderSuppressed = false;
    render();
    renderSuppressed = true;
    return;
  }

  const dxScreen = (e.clientX - drag.startX) / drag.scalePx;
  const dyScreen = (e.clientY - drag.startY) / drag.scalePx;

  if ((drag.type === 'bed' || drag.type === 'object') && drag.mode === 'move') {
    const L = drag.initial.lengthM, W = drag.initial.widthM;
    let nx = clamp(drag.initial.x + dxScreen, -L*0.3, state.gardenLengthM - L*0.7);
    let ny = clamp(drag.initial.y + dyScreen, -W*0.3, state.gardenWidthM - W*0.7);
    [nx, ny] = snapPosition(nx, ny, L, W, drag.id);
    const patch = {x:nx, y:ny};
    if (drag.type === 'bed') updateBed(drag.id, patch); else updateObject(drag.id, patch);
  } else if ((drag.type === 'bed' || drag.type === 'object') && drag.mode === 'resize') {
    const [dxLocal, dyLocal] = rotateVec(dxScreen, dyScreen, drag.initial.rotation || 0);
    const patch = {
      lengthM: clamp(drag.initial.lengthM + dxLocal, 0.2, 30),
      widthM:  clamp(drag.initial.widthM  + dyLocal, 0.2, 30),
    };
    if (drag.type === 'bed') updateBed(drag.id, patch); else updateObject(drag.id, patch);
  } else if ((drag.type === 'bed' || drag.type === 'object') && drag.mode === 'rotate') {
    const item = (drag.type === 'bed' ? state.beds : state.objects).find(x => x.id === drag.id);
    if (!item) return;
    const cxM = item.x + item.lengthM/2;
    const cyM = item.y + item.widthM/2;
    const canvas = document.getElementById('gp-canvas');
    const rect = canvas.getBoundingClientRect();
    const cxPx = rect.left + (cxM / state.gardenLengthM) * rect.width;
    const cyPx = rect.top + (cyM / state.gardenWidthM) * rect.height;
    const cur = angleBetween(cxPx, cyPx, e.clientX, e.clientY);
    let r = drag.initial.rotation + (cur - drag.initial.startAngle);
    if (e.shiftKey) r = Math.round(r / 15) * 15;
    else {
      for (const s of [0,90,180,270,-90,-180,-270,360,-360]) {
        if (Math.abs(r - s) < 4) { r = s; break; }
      }
    }
    r = ((r + 180) % 360 + 360) % 360 - 180;
    if (drag.type === 'bed') updateBed(drag.id, {rotation:r}); else updateObject(drag.id, {rotation:r});
  } else if (drag.type === 'planting') {
    updatePlanting(drag.id, {
      x: clamp(drag.initial.x + dxScreen, 0, state.gardenLengthM),
      y: clamp(drag.initial.y + dyScreen, 0, state.gardenWidthM),
    });
  } else if (drag.type === 'detail-planting') {
    const bed = state.beds.find(b => b.id === drag.bedId);
    if (!bed) return;
    const lx = clamp(drag.initialLocal[0] + dxScreen, 0, bed.lengthM);
    const ly = clamp(drag.initialLocal[1] + dyScreen, 0, bed.widthM);
    const [wx, wy] = bedLocalToWorld(bed, lx, ly);
    updatePlanting(drag.id, {x:wx, y:wy});
  }
  updateDragVisual();
}
function onPointerUp() {
  if (!drag) return;
  if (drag.moved) {
    // commit history snapshot taken at drag start
    history.push(drag.preDragState);
    if (history.length > 50) history.shift();
  }
  drag = null;
  renderSuppressed = false;
  saveSoon();
  scheduleRender();
}

// ── Curvy paths ─────────────────────────────────────────────────────────
// Convert a list of waypoints (in % units) to a smooth SVG path "d" attribute.
// Uses Catmull-Rom-to-cubic-Bezier conversion with closed-loop=false.
function smoothPathD(points) {
  if (!points || points.length === 0) return '';
  if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
  if (points.length === 2) return `M ${points[0].x} ${points[0].y} L ${points[1].x} ${points[1].y}`;
  const tension = 0.5; // 0 = linear, 1 = very smooth
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i - 1] || points[i];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2] || p2;
    const c1x = p1.x + (p2.x - p0.x) * tension / 3;
    const c1y = p1.y + (p2.y - p0.y) * tension / 3;
    const c2x = p2.x - (p3.x - p1.x) * tension / 3;
    const c2y = p2.y - (p3.y - p1.y) * tension / 3;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

// Estimate the midpoint of a smooth curve between two waypoints, given neighbours,
// by evaluating the Bezier at t=0.5. Used to position "+ insert here" handles.
function curveSegmentMid(prev, p1, p2, next) {
  const p0 = prev || p1;
  const p3 = next || p2;
  const t = 0.5, tension = 0.5;
  const c1x = p1.x + (p2.x - p0.x) * tension / 3;
  const c1y = p1.y + (p2.y - p0.y) * tension / 3;
  const c2x = p2.x - (p3.x - p1.x) * tension / 3;
  const c2y = p2.y - (p3.y - p1.y) * tension / 3;
  const omt = 1 - t;
  const x = omt*omt*omt*p1.x + 3*omt*omt*t*c1x + 3*omt*t*t*c2x + t*t*t*p2.x;
  const y = omt*omt*omt*p1.y + 3*omt*omt*t*c1y + 3*omt*t*t*c2y + t*t*t*p2.y;
  return {x, y};
}

// Render all paths as a single SVG overlay. Paths are stored in % units (0-100 of
// garden length/width), so the SVG sizes to the canvas naturally.
function pathsSVG() {
  if (!state.paths || state.paths.length === 0 && !pathDraftId) return '';
  const items = state.paths || [];
  return `
    <svg class="gp-paths-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="false">
      ${items.map(path => {
        const style = PATH_STYLES_BY_ID[path.style] || PATH_STYLES_BY_ID.gravel;
        const isSelected = selectedItem && selectedItem.type === 'path' && selectedItem.id === path.id;
        // Scale path width from metres to % (relative to garden length axis only —
        // we'll use the longer dimension to keep it visually consistent)
        const pctW = (path.widthM / state.gardenLengthM) * 100;
        const d = smoothPathD(path.points);
        if (!d) return '';
        const strokeWidth = Math.max(0.4, pctW);

        const isStepping = path.style === 'stepping';
        const isPaving = path.style === 'paving';

        // Visible layers (style-dependent)
        let visibleLayers;
        if (isStepping) {
          // Spaced stones - no continuous line
          let stones = path.points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="${strokeWidth*0.42}" fill="${style.fill}" stroke="${style.edge}" stroke-width=".3" vector-effect="non-scaling-stroke"/>`).join('');
          for (let i = 0; i < path.points.length - 1; i++) {
            const mid = curveSegmentMid(path.points[i-1], path.points[i], path.points[i+1], path.points[i+2]);
            stones += `<circle cx="${mid.x}" cy="${mid.y}" r="${strokeWidth*0.42}" fill="${style.fill}" stroke="${style.edge}" stroke-width=".3" vector-effect="non-scaling-stroke"/>`;
          }
          visibleLayers = stones;
        } else {
          visibleLayers = `
            <path d="${d}" fill="none" stroke="${style.edge}" stroke-width="${strokeWidth + 0.3}" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" opacity=".75" pointer-events="none"/>
            <path d="${d}" fill="none" stroke="${style.fill}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" pointer-events="none"/>
            ${isPaving ? (() => {
              // tick marks across the path for paving slab look — every ~1/4 of the path
              let ticks = '';
              for (let i = 0; i < path.points.length - 1; i++) {
                const mid = curveSegmentMid(path.points[i-1], path.points[i], path.points[i+1], path.points[i+2]);
                ticks += `<circle cx="${mid.x}" cy="${mid.y}" r="${strokeWidth*0.08}" fill="${style.edge}" opacity=".6"/>`;
              }
              return ticks;
            })() : ''}
          `;
        }

        const selectionHalo = isSelected ? (isStepping
          ? path.points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="${strokeWidth*0.55}" fill="none" stroke="rgba(45,74,46,.55)" stroke-width=".6" vector-effect="non-scaling-stroke" pointer-events="none"/>`).join('')
          : `<path d="${d}" fill="none" stroke="rgba(45,74,46,.55)" stroke-width="${strokeWidth + 1.2}" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" pointer-events="none"/>`
        ) : '';

        return `
          ${selectionHalo}
          ${visibleLayers}
          <path class="gp-path-stroke" d="${d}" fill="none" stroke="transparent" stroke-width="${Math.max(strokeWidth, 2.5)}" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" data-action="select-path" data-id="${path.id}"/>
          ${isSelected ? pathHandlesSVG(path) : ''}
        `;
      }).join('')}

      ${pathDraftId ? (() => {
        const draft = state.paths.find(p => p.id === pathDraftId);
        if (!draft) return '';
        const style = PATH_STYLES_BY_ID[draft.style] || PATH_STYLES_BY_ID.gravel;
        const pctW = (draft.widthM / state.gardenLengthM) * 100;
        return draft.points.map((p, i) => `
          <circle cx="${p.x}" cy="${p.y}" r="${Math.max(.8, pctW*0.5)}" fill="#2d4a2e" stroke="#f4ecd8" stroke-width=".4" vector-effect="non-scaling-stroke"/>
        `).join('');
      })() : ''}
    </svg>
  `;
}

function pathHandlesSVG(path) {
  const pts = path.points;
  let html = '';
  // Insert "+" markers between each pair of waypoints
  for (let i = 0; i < pts.length - 1; i++) {
    const mid = curveSegmentMid(pts[i-1], pts[i], pts[i+1], pts[i+2]);
    html += `
      <g class="gp-path-add" data-action="insert-path-point" data-path-id="${path.id}" data-after-index="${i}">
        <circle cx="${mid.x}" cy="${mid.y}" r="1.1" fill="#f4ecd8" stroke="#2d4a2e" stroke-width=".4" vector-effect="non-scaling-stroke"/>
        <line x1="${mid.x-.55}" y1="${mid.y}" x2="${mid.x+.55}" y2="${mid.y}" stroke="#2d4a2e" stroke-width=".3" vector-effect="non-scaling-stroke"/>
        <line x1="${mid.x}" y1="${mid.y-.55}" x2="${mid.x}" y2="${mid.y+.55}" stroke="#2d4a2e" stroke-width=".3" vector-effect="non-scaling-stroke"/>
      </g>
    `;
  }
  // Waypoint handles
  pts.forEach((p, i) => {
    html += `
      <g class="gp-path-handle" data-action="path-point-drag-start" data-path-id="${path.id}" data-point-index="${i}">
        <circle cx="${p.x}" cy="${p.y}" r="1.7" fill="#2d4a2e" stroke="#f4ecd8" stroke-width=".5" vector-effect="non-scaling-stroke"/>
      </g>
    `;
  });
  return html;
}


function rectHTML(item, kind) {
  const isSelected = selectedItem && selectedItem.type === kind && selectedItem.id === item.id;
  const obj = kind === 'object' ? OBJECT_BY_ID[item.typeId] : null;
  const isCircle = obj && obj.shape === 'circle';
  const scale = canvasWidthPx / state.gardenLengthM;
  const lengthPx = item.lengthM * scale;
  const widthPx = item.widthM * scale;
  const cxPctX = ((item.x + item.lengthM/2) / state.gardenLengthM) * 100;
  const cxPctY = ((item.y + item.widthM /2) / state.gardenWidthM ) * 100;

  let bg, border;
  if (kind === 'bed') {
    bg = 'rgba(139,111,71,.18)'; border = '2px dashed rgba(107,93,79,.55)';
  } else if (obj.cat === 'ground') {
    bg = 'transparent'; border = 'none';
  } else {
    bg = 'transparent'; border = 'none';
  }
  const sel = isSelected ? 'box-shadow:0 0 0 3px rgba(45,74,46,.55),0 6px 24px rgba(45,74,46,.18);' : '';
  const z = isSelected ? 20 : (kind === 'object' && obj.cat === 'ground') ? 1 : kind === 'bed' ? 4 : 8;
  const handles = isSelected ? `
    <div class="gp-rotate-handle" data-action="drag-start" data-type="${kind}" data-id="${item.id}" data-mode="rotate" title="Drag to rotate">${ICON.rotate('gp-icon w3', '')}</div>
    <div class="gp-rotate-stem"></div>
    <div class="gp-resize-handle" data-action="drag-start" data-type="${kind}" data-id="${item.id}" data-mode="resize" title="Drag to resize">${ICON.movediag('gp-icon w2-5', '')}</div>
  ` : '';
  const labelTxt = kind === 'object'
    ? esc(item.label || obj.name)
    : esc(item.name);
  const showLabel = kind === 'bed' || isSelected || (item.label && item.label !== obj?.name);
  const svgVisual = kind === 'object' ? objectVisualSVG(item, obj) : '';

  return `
    <div class="gp-rect ${isSelected ? 'selected':''}"
         data-action="drag-start" data-type="${kind}" data-id="${item.id}" data-mode="move"
         style="left:${cxPctX}%;top:${cxPctY}%;width:${lengthPx}px;height:${widthPx}px;transform:translate(-50%,-50%) rotate(${item.rotation || 0}deg);border-radius:${isCircle ? '50%' : '4px'};z-index:${z};background:${bg};border:${border};${sel}">
      ${svgVisual}
      ${showLabel ? `<span class="gp-rect-label">${labelTxt}</span>` : ''}
      ${handles}
    </div>
  `;
}

function plantingHTML(p, opts) {
  const plant = PLANTS_BY_ID[p.plantId];
  if (!plant) return '';
  const {scale, leftPct, topPct, dim, dragAction, dragData} = opts;
  const isSelected = selectedItem && selectedItem.type === 'planting' && selectedItem.id === p.id;
  const sizePx = Math.max(28, plant.sizeCm * scale / 100);
  const emoji = clamp(sizePx * 0.55, 13, 26);

  const focusId = selectedPlant || (selectedItem?.type === 'planting' ? state.plantings.find(x => x.id === selectedItem.id)?.plantId : null);
  let ring = null;
  if (focusId && !isSelected) {
    const rel = companionRel(focusId, p.plantId);
    if (rel === 'good') ring = 'rgba(90,143,78,.9)';
    else if (rel === 'bad') ring = 'rgba(217,138,61,.95)';
  }
  const sel = isSelected
    ? '0 0 0 3px rgba(45,74,46,.55),0 6px 14px rgba(45,74,46,.28)'
    : ring ? `0 0 0 3px ${ring}` : 'none';
  const dimmed = dim ? ' dimmed' : '';

  return `
    <div class="gp-planting${isSelected ? ' selected' : ''}${dimmed}"
         ${dragAction} ${dragData}
         style="left:${leftPct}%;top:${topPct}%;width:${sizePx}px;height:${sizePx}px;background:${plant.color}66;border-color:${plant.color};font-size:${emoji}px;box-shadow:${sel}"
         title="${esc(plant.name)}">
      <span style="pointer-events:none">${plant.icon}</span>
    </div>
  `;
}

function designViewHTML() {
  const maxCanvasHeight = 540;
  const maxCanvasWidth = (maxCanvasHeight * state.gardenLengthM) / state.gardenWidthM;
  const scale = canvasWidthPx / state.gardenLengthM;
  const isGround = (typeId) => OBJECT_BY_ID[typeId]?.cat === 'ground';
  const groundObjects = state.objects.filter(o => isGround(o.typeId));
  const featureObjects = state.objects.filter(o => !isGround(o.typeId));
  const selectedBed = selectedItem?.type === 'bed' ? state.beds.find(b => b.id === selectedItem.id) : null;
  const selectedObject = selectedItem?.type === 'object' ? state.objects.find(o => o.id === selectedItem.id) : null;
  const selectedPlanting = selectedItem?.type === 'planting' ? state.plantings.find(p => p.id === selectedItem.id) : null;
  const stats = computeStats();

  // Companion summary for selected planting
  let compSummary = null;
  if (selectedPlanting) {
    let good = 0, bad = 0;
    state.plantings.forEach(other => {
      if (other.id === selectedPlanting.id) return;
      const dist = Math.hypot(other.x - selectedPlanting.x, other.y - selectedPlanting.y);
      if (dist > 1.5) return;
      const rel = companionRel(selectedPlanting.plantId, other.plantId);
      if (rel === 'good') good++; else if (rel === 'bad') bad++;
    });
    compSummary = {good, bad};
  }

  const settingsPanel = gardenSettingsOpen ? `
    <div class="gp-rise mb-4 p-4 rounded-lg" style="background:rgba(45,74,46,.05);border:1px dashed rgba(45,74,46,.2)">
      <div class="row items-center gap-4 flex-wrap text-sm">
        <label class="row items-center gap-2">
          <span style="color:#6b5d4f">Garden length</span>
          <input type="number" min="1" max="30" step="0.1" value="${state.gardenLengthM}"
            class="gp-number" data-action="update-garden" data-field="gardenLengthM" data-focus-key="g-len">
          <span class="text-xs" style="color:#6b5d4f">m</span>
        </label>
        <label class="row items-center gap-2">
          <span style="color:#6b5d4f">Garden width</span>
          <input type="number" min="1" max="30" step="0.1" value="${state.gardenWidthM}"
            class="gp-number" data-action="update-garden" data-field="gardenWidthM" data-focus-key="g-wid">
          <span class="text-xs" style="color:#6b5d4f">m</span>
        </label>
        <span class="gp-italic text-xs" style="color:#6b5d4f">${(state.gardenLengthM * state.gardenWidthM).toFixed(2)} m² total</span>
      </div>
    </div>
  ` : '';

  const pathDraft = pathDraftId ? state.paths.find(p => p.id === pathDraftId) : null;
  const banner = pathDraft ? `
    <div class="gp-banner">
      <span class="text-xl">🛤</span>
      <span class="flex-1 text-sm">
        Tap to add waypoints — the path curves smoothly through them.
        <span style="opacity:.75"> ${pathDraft.points.length} ${pathDraft.points.length === 1 ? 'point' : 'points'} so far${pathDraft.points.length < 2 ? ' (need at least 2)' : ''}.</span>
      </span>
      ${pathDraft.points.length >= 2 ? `<button class="text-xs uppercase tracking-wider opacity-90" data-action="finish-path-draft" style="text-decoration:underline">Done</button>` : ''}
      <button class="text-xs uppercase tracking-wider opacity-70" data-action="cancel-path-draft" style="text-decoration:underline">Cancel</button>
    </div>
  ` : (selectedPlant ? `
    <div class="gp-banner gp-rise">
      <span class="text-xl">${PLANTS_BY_ID[selectedPlant]?.icon}</span>
      <span class="flex-1 text-sm">
        Tap anywhere in the garden to plant <strong class="gp-banner-strong">${esc(PLANTS_BY_ID[selectedPlant]?.name)}</strong>.
        <span style="opacity:.75"> Good neighbours show a green ring, ones to keep apart show amber.</span>
      </span>
      <button class="text-xs uppercase tracking-wider opacity-80" data-action="clear-selected-plant" style="text-decoration:underline">Done</button>
    </div>
  ` : '');

  const monthBar = `
    <div class="gp-month-bar gp-rise">
      ${ICON.caldays('gp-icon w4', 'flex-shrink-0')}
      <span class="text-sm font-semibold" style="color:#2d4a2e;min-width:64px">${viewMonth === 0 ? 'All year' : MONTHS[viewMonth-1]}</span>
      <input type="range" min="0" max="12" step="1" value="${viewMonth}" class="gp-range" data-action="set-month">
      ${viewMonth !== 0 ? `
        <span class="gp-italic text-xs" style="color:#6b5d4f">
          ${state.plantings.filter(p => PLANTS_BY_ID[p.plantId]?.months.includes(viewMonth)).length} of ${state.plantings.length} in the ground
        </span>
        <button class="text-xs" style="color:#2d4a2e;text-decoration:underline" data-action="set-month-zero">show all</button>` : ''}
    </div>
  `;

  // Canvas contents
  const canvasInner = `
    ${groundObjects.map(o => rectHTML(o, 'object')).join('')}
    ${pathsSVG()}
    ${state.beds.map(b => rectHTML(b, 'bed')).join('')}
    ${featureObjects.map(o => rectHTML(o, 'object')).join('')}
    ${state.plantings.map(p => {
      const plant = PLANTS_BY_ID[p.plantId];
      if (!plant) return '';

function pollinatorsHTML() {
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Aggregate by planting
  const monthly = Array(12).fill(0);          // total forage value per month
  const monthlyTypes = Array.from({length:12}, () => new Set());
  const typesServed = {bees:0, butterflies:0, hoverflies:0};
  const plantedBuckets = new Map();           // plantId -> {count, info, plant}

  state.plantings.forEach(pl => {
    const plant = PLANTS_BY_ID[pl.plantId];
    if (!plant) return;
    const info = pollinatorInfo(pl.plantId);
    if (!plantedBuckets.has(pl.plantId)) plantedBuckets.set(pl.plantId, {plant, info, count:0});
    plantedBuckets.get(pl.plantId).count++;
    info.bloomMonths.forEach(m => {
      monthly[m-1] += info.value;
      info.pollinators.forEach(t => monthlyTypes[m-1].add(t));
    });
    info.pollinators.forEach(t => { if (t in typesServed) typesServed[t]++; });
  });

  const totalScore = Object.values(monthly).reduce((a,b)=>a+b, 0);
  const maxMonth = Math.max(1, ...monthly);
  const plantedList = Array.from(plantedBuckets.values())
    .filter(b => b.info.value > 0)
    .sort((a,b) => (b.info.value*b.count) - (a.info.value*a.count));

  // Suggestions: plants NOT planted yet, sorted by value, top 6
  const plantedIds = new Set(state.plantings.map(p => p.plantId));
  const suggestions = ENRICHED_PLANTS
    .filter(p => !plantedIds.has(p.id) && pollinatorInfo(p.id).value === 3)
    .sort((a,b) => {
      // Prefer suggestions that cover the lowest-coverage months in the garden
      const ai = pollinatorInfo(a.id), bi = pollinatorInfo(b.id);
      const gapScore = (info) => info.bloomMonths.reduce((s,m) => s + (1 / Math.max(1, monthly[m-1] + 1)), 0);
      return gapScore(bi) - gapScore(ai);
    })
    .slice(0, 6);

  // Build the seasonal forage chart
  const chartCols = monthly.map((v, i) => {
    const pct = v === 0 ? 0 : Math.max(8, (v / maxMonth) * 100);
    const types = Array.from(monthlyTypes[i]);
    const fill = v === 0
      ? 'background:rgba(107,93,79,.12)'
      : `background:linear-gradient(to top, #2d4a2e ${100 - pct}%, #87a878 100%)`;
    const isLow = v > 0 && v < maxMonth * 0.35;
    return `
      <div class="gp-pol-col" title="${monthNames[i]}: ${v} pollinator-value · ${types.join(', ') || 'no forage'}">
        <div class="gp-pol-bar-wrap">
          <div class="gp-pol-bar" style="height:${pct}%;${fill}"></div>
        </div>
        <div class="gp-pol-month ${i === new Date().getMonth() ? 'current' : ''}">${monthNames[i]}</div>
      </div>
    `;
  }).join('');

  // Find quietest months with at least one planting
  const lowMonths = totalScore > 0
    ? monthly.map((v,i) => ({v, i})).filter(x => x.v <= maxMonth * 0.35).map(x => monthNames[x.i])
    : [];

  const empty = state.plantings.length === 0;

  return `
    <div>
      <div class="mb-6">
        <h2 class="gp-display text-3xl mb-2">For the Pollinators</h2>
        <p class="gp-italic" style="color:#6b5d4f">
          A view of your garden through the eyes of bees, butterflies and hoverflies — what's in bloom, and when.
        </p>
      </div>

      ${empty ? `
        <div class="p-5 rounded-xl mb-6" style="background:rgba(45,74,46,.05);border:1px dashed rgba(45,74,46,.25)">
          <p class="text-sm" style="color:#3e6b36">
            Plant something pollinator-friendly to see your garden's value to bees, butterflies and hoverflies.
            Lavender, rosemary, foxglove, sunflower and marigold are all excellent choices.
          </p>
        </div>
      ` : `

        <!-- Score summary -->
        <div class="grid cols-3 gap-3 mb-6">
          ${POLLINATOR_TYPES.map(t => {
            const n = typesServed[t.id];
            return `
              <div class="p-4 rounded-xl" style="background:${t.color}14;border:1px solid ${t.color}33">
                <div class="text-2xl mb-1">${t.icon}</div>
                <div class="text-10 uppercase tracking-widest" style="color:#6b5d4f">${t.label}</div>
                <div class="gp-display text-2xl mt-1" style="color:${t.color}">${n}</div>
                <div class="text-10" style="color:#6b5d4f">plant${n === 1 ? '' : 's'} feeding them</div>
              </div>
            `;
          }).join('')}
        </div>

        <!-- Seasonal forage chart -->
        <div class="mb-6 p-4 rounded-xl" style="background:#fbf6ea;border:1px solid rgba(107,93,79,.25)">
          <div class="row items-baseline justify-between mb-1">
            <h3 class="gp-display text-lg">Seasonal forage</h3>
            <span class="text-xs gp-italic" style="color:#6b5d4f">when your garden's in bloom</span>
          </div>
          <div class="gp-pol-chart mt-3">${chartCols}</div>
          ${lowMonths.length ? `
            <p class="text-xs mt-3 gp-italic" style="color:#9a5a1d">
              Quieter months for pollinators: ${lowMonths.join(', ')}. Adding plants that bloom then would help.
            </p>` : ''}
        </div>

        <!-- Planted plants -->
        ${plantedList.length ? `
          <div class="mb-6">
            <h3 class="gp-display text-lg mb-3">In your garden</h3>
            <div class="grid cols-1 sm:cols-2 gap-2">
              ${plantedList.map(b => {
                const stars = '●'.repeat(b.info.value) + '○'.repeat(3 - b.info.value);
                return `
                  <div class="p-3 rounded-lg row items-start gap-3" style="background:#fbf6ea;border:1px solid rgba(107,93,79,.18)">
                    <div class="w10 h10 rounded-md row items-center justify-center text-xl flex-shrink-0" style="background:${b.plant.color}1f">${b.plant.icon}</div>
                    <div class="flex-1 min-w-0">
                      <div class="row items-baseline gap-2">

                        <span class="text-10" style="color:#6b5d4f">×${b.count}</span>
                      </div>
                      <div class="text-10 mt-0.5" style="color:#6b5d4f">
                        <span style="color:#3e6b36;letter-spacing:.05em">${stars}</span>
                        · ${b.info.pollinators.map(t => POLLINATOR_TYPE_BY_ID[t]?.icon || '').join(' ') || '—'}
                      </div>
                      ${b.info.note ? `<div class="text-10 gp-italic mt-1" style="color:#6b5d4f">${esc(b.info.note)}</div>` : ''}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}
      `}

      <!-- Suggestions -->
      ${suggestions.length ? `
        <div class="mb-6">
          <h3 class="gp-display text-lg mb-1">Add more for pollinators</h3>
          <p class="text-xs gp-italic mb-3" style="color:#6b5d4f">
            ${empty ? 'Top-value plants for UK pollinators.' : `Three-star plants you haven't planted yet${lowMonths.length ? ', favouring the quiet months' : ''}.`}
          </p>
          <div class="grid cols-2 sm:cols-3 gap-2">
            ${suggestions.map(p => {
              const info = pollinatorInfo(p.id);
              const months = info.bloomMonths.length
                ? `${monthNames[info.bloomMonths[0]-1]}–${monthNames[info.bloomMonths[info.bloomMonths.length-1]-1]}`
                : '';
              return `
                <div class="p-3 rounded-lg" style="background:#fbf6ea;border:1px solid rgba(107,93,79,.18);cursor:pointer" role="button" tabindex="0" data-action="open-info" data-plant-id="${p.id}">

// ── Event delegation ────────────────────────────────────────────────────
function bindEvents() {
  const root = document.getElementById('root');

  // Pointer-down (drag start, canvas tap, modal close)
  root.addEventListener('pointerdown', (e) => {
    // Modal: close on backdrop tap; ignore on inner content
    if (e.target.closest('[data-stop]')) {
      e.stopPropagation();
    }

    // PATH DRAFT MODE: any pointerdown inside the canvas adds a waypoint,
    // regardless of what element it hits (beds, objects, existing paths, etc).
    // This means clicks on beds/objects don't get hijacked while drawing.
    if (pathDraftId) {
      const canvas = document.getElementById('gp-canvas');
      if (canvas && canvas.contains(e.target)) {
        const rect = canvas.getBoundingClientRect();
        const pctX = ((e.clientX - rect.left) / rect.width) * 100;
        const pctY = ((e.clientY - rect.top)  / rect.height) * 100;
        appendPathPoint(pctX, pctY);
        e.stopPropagation();
        e.preventDefault();
        return;
      }
    }

    const t = e.target.closest('[data-action]');
    if (!t) return;
    const action = t.dataset.action;

    if (action === 'drag-start') {
      const type = t.dataset.type;
      const id = t.dataset.id;
      const mode = t.dataset.mode || 'move';
      startDrag(e, type, id, mode, t);
    } else if (action === 'detail-drag-start') {
      startDetailDrag(e, t.dataset.id, t);
    } else if (action === 'path-point-drag-start') {
      startPathPointDrag(e, t.dataset.pathId, parseInt(t.dataset.pointIndex, 10), t);
    } else if (action === 'canvas-tap') {
      // Tap directly on canvas background only
      if (e.target.id !== 'gp-canvas') return;
      if (pathDraftId) {
        // Translate client coords to %-of-garden coords
        const rect = document.getElementById('gp-canvas').getBoundingClientRect();
        const pctX = ((e.clientX - rect.left) / rect.width) * 100;
        const pctY = ((e.clientY - rect.top)  / rect.height) * 100;
        appendPathPoint(pctX, pctY);
        return;
      }
      if (selectedPlant) placePlantAt(e.clientX, e.clientY);
      else { selectedItem = null; scheduleRender(); }
    } else if (action === 'detail-canvas-tap') {
      if (e.target.id !== 'gp-detail-canvas') return;
      if (selectedPlant) placePlantInBedAt(e.clientX, e.clientY);
      else { selectedItem = null; scheduleRender(); }
    }
  });

  // Window-level pointer move/up so drags don't drop on fast moves
  window.addEventListener('pointermove', (e) => { if (drag) { onPointerMove(e); e.preventDefault(); } }, {passive:false});
  window.addEventListener('pointerup', () => { if (drag) onPointerUp(); });
  window.addEventListener('pointercancel', () => { if (drag) onPointerUp(); });

  // Click (most non-drag actions). Use click — fires after pointerup, won't fire mid-drag thanks to moved-check.
  root.addEventListener('click', (e) => {
    if (drag && drag.moved) return;
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const a = t.dataset.action;
    // Skip drag and canvas tap (handled by pointerdown)
    if (a === 'drag-start' || a === 'detail-drag-start' || a === 'path-point-drag-start' || a === 'canvas-tap' || a === 'detail-canvas-tap') return;

    switch (a) {
      case 'set-view':           setView(t.dataset.view); break;
      case 'edit-garden-name':   editingName = true; scheduleRender(); break;
      case 'toggle-garden-settings': gardenSettingsOpen = !gardenSettingsOpen; scheduleRender(); break;
      case 'add-bed':            addBed(); break;
      case 'undo':               undo(); break;
      case 'clear-selected-plant': selectedPlant = null; scheduleRender(); break;
      case 'clear-selected-item':  selectedItem = null;  scheduleRender(); break;
      case 'set-month-zero':     viewMonth = 0; scheduleRender(); break;
      case 'set-picker':         pickerMode = t.dataset.picker; scheduleRender(); break;
      case 'set-category':
        if (pickerMode === 'plants' || view !== 'design' || bedDetailId) plantCategory = t.dataset.cat;
        else objectCategory = t.dataset.cat;
        scheduleRender();
        break;
      case 'pick-plant':
        selectedPlant = (selectedPlant === t.dataset.plantId) ? null : t.dataset.plantId;
        scheduleRender();
        break;
      case 'add-object':         addObject(t.dataset.objectId); break;
      case 'open-info':          e.stopPropagation(); infoPlantId = t.dataset.plantId; scheduleRender(); break;
      case 'close-info':
        // If t (matched action) is the backdrop AND the click started inside modal content,
        // the user clicked non-action modal content that bubbled up — ignore.
        // If t is inside data-stop (e.g. the X button), close as intended.
        if (!t.closest('[data-stop]') && e.target.closest('[data-stop]')) return;
        infoPlantId = null; scheduleRender();
        break;
      case 'plant-this':
        selectedPlant = t.dataset.plantId; infoPlantId = null;
        if (view !== 'design') view = 'design';
        scheduleRender();
        break;
      case 'duplicate-selected': duplicateSelected(); break;
      case 'delete-selected':    deleteSelected(); break;
      case 'open-bed-detail':    bedDetailId = t.dataset.id; selectedItem = null; selectedPlant = null; scheduleRender(); break;
      case 'close-bed-detail':   bedDetailId = null; selectedItem = null; scheduleRender(); break;
      case 'reset-rotation': {
        snap();
        const tgt = t.dataset.target, id = t.dataset.id;
        if (tgt === 'bed') updateBed(id, {rotation:0}); else updateObject(id, {rotation:0});
        scheduleRender();
        break;
      }
      case 'toggle-task':        toggleBedTask(t.dataset.bedId, t.dataset.taskId); break;
      case 'delete-task':        deleteBedTask(t.dataset.bedId, t.dataset.taskId); break;
      case 'add-task':           addBedTask(t.dataset.bedId, newTaskText); break;
      case 'toggle-shopping':    toggleShopping(t.dataset.key); break;
      case 'set-notes-bed':      notesBedId = t.dataset.id; scheduleRender(); break;
      case 'start-path-draft':   startPathDraft(t.dataset.style || 'gravel'); break;
      case 'finish-path-draft':  finishPathDraft(); break;
      case 'cancel-path-draft': {
        if (pathDraftId) {
          state.paths = state.paths.filter(p => p.id !== pathDraftId);
          pathDraftId = null;
          saveSoon(); scheduleRender();
        }
        break;
      }
      case 'select-path':        selectedItem = {type:'path', id:t.dataset.id}; scheduleRender(); break;
      case 'set-path-style':     updatePath(t.dataset.id, {style: t.dataset.style}); scheduleRender(); break;
      case 'insert-path-point':  insertPathPoint(t.dataset.pathId, parseInt(t.dataset.afterIndex, 10)); break;
      case 'delete-path-point': {
        const p = state.paths.find(p => p.id === t.dataset.pathId);
        const idx = parseInt(t.dataset.pointIndex, 10);
        if (p && p.points.length > 2) {
          snap();
          p.points.splice(idx, 1);
          saveSoon();
          scheduleRender();
        }
        break;
      }
    }
  });

  // Inputs (oninput-style, won't lose focus thanks to render restoration)
  root.addEventListener('input', (e) => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const a = t.dataset.action;
    const v = t.value;
    switch (a) {
      case 'garden-name-input': setGardenName(v); break;
      case 'update-garden': {
        const field = t.dataset.field;
        const n = clamp(+v || 1, 1, 30);
        state[field] = n; saveSoon(); scheduleRender(); break;
      }
      case 'update-name': {
        const id = t.dataset.id;
        const target = t.dataset.target;
        if (target === 'bed') updateBed(id, {name:v});
        else if (target === 'object') updateObject(id, {label:v});
        // No full render — focus stays in input; values are read fresh from state
        break;
      }
      case 'update-size': {
        const id = t.dataset.id;
        const target = t.dataset.target;
        const field = t.dataset.field;
        const min = field === 'rotation' ? -180 : 0.2;
        const max = field === 'rotation' ?  180 : 30;
        const n = clamp(+v || (field === 'rotation' ? 0 : 0.2), min, max);
        if (target === 'bed') updateBed(id, {[field]: n});
        else updateObject(id, {[field]: n});
        scheduleRender();
        break;
      }
      case 'set-month':
        viewMonth = clamp(+v || 0, 0, 12); scheduleRender(); break;
      case 'set-path-width': {
        const w = clamp(+v || 0.6, 0.2, 5);
        updatePath(t.dataset.id, {widthM: w});
        scheduleRender();
        break;
      }
      case 'task-input':
        newTaskText = v; break;
      case 'update-notes':
        setBedNotes(t.dataset.bedId, v); break;
    }
  });

  // Push history on focus/click into editable fields
  root.addEventListener('focusin', (e) => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const a = t.dataset.action;
    if (a === 'garden-name-input' || a === 'update-garden' || a === 'update-name' || a === 'update-size' || a === 'update-notes') {
      // Take one snapshot per focus session
      if (!t._gpHistTaken) { snap(); t._gpHistTaken = true; }
    }
  });
  root.addEventListener('focusout', (e) => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    delete t._gpHistTaken;
    if (t.dataset.action === 'garden-name-input') { editingName = false; scheduleRender(); }
  });

  // Enter key to add task / finish editing name
  root.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const a = t.dataset.action;
    if (a === 'task-input') {
      e.preventDefault();
      addBedTask(t.dataset.bedId, newTaskText);
    } else if (a === 'garden-name-input') {
      t.blur();
    }
  });
}

// Flush any pending save before the tab is closed
window.addEventListener('beforeunload', () => {
  if (saveTimer) {
    clearTimeout(saveTimer);
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }
});

// ── Init ────────────────────────────────────────────────────────────────
load();
render();
bindEvents();

})();
</script>
</body>
</html>
