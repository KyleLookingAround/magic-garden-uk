[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    # Don't fetch Playwright's browsers during deploy installs — it's CI-only.
    PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"

# Security and caching headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; worker-src 'self';"

# Long-lived cache for hashed build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-lived cache for the manifest and favicon (content rarely changes)
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# The service worker must always revalidate so updates ship promptly
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
